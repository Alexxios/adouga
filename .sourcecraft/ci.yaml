on:
  push:
    - workflows: [sample-workflow]
      filter:
        branches: ["master", "main"]
    - workflows: [autotests]

workflows:
  autotests:
    runs_on: serverless
    tasks:
      - name: pytest
        cubes:
          - name: pytest
            image: cr.yandex/mirror/library/python:3.13.2-slim
            script:
              - python -m pip install --upgrade pip
              - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
              - pytest tests/
  sample-workflow:
    runs_on: serverless # Experimental mode. For other options, see: https://sourcecraft.dev/portal/docs/ru/sourcecraft/ci-cd-ref/workflows
    tasks:
      - name: sample-task
        cubes:
          - name: sample-cube1
            image: cr.yandex/mirror/library/python:3.13.2-slim
            script:
              - python -m pip install --upgrade pip
              - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
