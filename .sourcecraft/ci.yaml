on:
  push:
    - workflows: [sample-workflow]
      filter:
        branches: ["master", "main"]
    - workflows: [autotests2]

workflows:
  autotests2:
    runs_on: serverless
    tasks:
      - name: pytest
        cubes:
          - name: pytest
            image: cr.yandex/mirror/library/python:3.14-slim
            script:
              - |
                set -eo pipefail
                apt-get update
                apt-get install -y python3-dev gcc linux-headers-generic
                python -m pip install --upgrade pip setuptools wheel
                if [ -f pyproject.toml ]; then
                  pip install poetry
                  poetry -v install
                  poetry run pytest tests/
                fi
  sample-workflow:
    runs_on: serverless # Experimental mode. For other options, see: https://sourcecraft.dev/portal/docs/ru/sourcecraft/ci-cd-ref/workflows
    tasks:
      - name: sample-task
        cubes:
          - name: sample-cube1
            image: cr.yandex/mirror/library/python:3.14-slim
            script:
              - python -m pip install --upgrade pip
              - if [ -f pyproject.toml ]; then
              -   pip install poetry
              -   poetry install
              - fi
