on:
  push:
    - workflows: [autotests]
    - workflows: [build-dev-windows]
      filter:
        branches: ["main"]

workflows:
  autotests:
    runs_on: serverless
    env:
      PYNPUT_BACKEND: dummy # Bypass pynput import errors
      CI: true
    tasks:
      - name: pytest
        cubes:
          - name: pytest
            image: cr.yandex/mirror/library/python:3.14-slim
            script:
              - |
                set -eo pipefail
                apt-get -qq update
                apt-get -qq install -y python3-dev gcc linux-headers-generic
                python -m pip install --upgrade pip setuptools wheel
                if [ -f pyproject.toml ]; then
                  pip install poetry
                  poetry install
                  poetry run pytest desktop/tests/
                fi

  build-dev-windows:
    tasks:
      - name: build-dev-installer
        cubes:
          # 1. Export Poetry dependencies to requirements.txt
          - name: prepare-requirements
            image: cr.yandex/mirror/library/python:3.14-slim
            script:
              - |
                set -eo pipefail
                pip install poetry
                cd desktop
                poetry export -f requirements.txt -o requirements.txt --without dev

          # 2. Build Windows .exe via PyInstaller (Wine-based, cross-compiles on Linux)
          - name: pyinstaller
            action: JackMcKew/pyinstaller-action-windows@main
            with:
              path: desktop
              spec: dev_main.spec

          # 3. Build Windows installer with Inno Setup (Wine-based, runs on Linux)
          - name: innosetup
            image: amake/innosetup:innosetup6
            script:
              - iscc desktop/installer.iss
